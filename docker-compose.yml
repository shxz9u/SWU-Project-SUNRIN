services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    profiles:
      - local-ollama
    network_mode: host
    environment:
      OLLAMA_HOST: 127.0.0.1:11434
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

  pi-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pi-gateway
    network_mode: host
    environment:
      OLLAMA_BASE_URL: http://210.110.103.200:11434
      OLLAMA_MODEL: gemma4
      OLLAMA_CONNECT_RETRIES: 30
      OLLAMA_CONNECT_DELAY_SECONDS: 2
      OLLAMA_REQUEST_TIMEOUT_SECONDS: 120
      FUZZ_RECOMPILE: 1
      FUZZ_ITERATIONS: 200
      FUZZ_TIMEOUT_SECONDS: 2
      FUZZ_INPUT_MODE: stdin
      FUZZ_RANDOM_SEED: 1337
      FUZZ_VERIFY_RUNS: 3
      FUZZ_VERIFY_THRESHOLD: 2
      WORK_DIR: /work
    volumes:
      - ./work:/work
      - ./analyzer:/app/analyzer

volumes:
  ollama-data:
